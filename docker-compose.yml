services:
  mysql:
    image: mysql:8
    container_name: vambora-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-vambora_penedo}
      MYSQL_USER: ${MYSQL_USER:-vambora}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-vambora123}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - vambora-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: vambora-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-vambora}:${MYSQL_PASSWORD:-vambora123}@mysql:3306/${MYSQL_DATABASE:-vambora_penedo}
      JWT_SECRET: ${JWT_SECRET:-vambora-penedo-secret-key-2025}
      NODE_ENV: ${NODE_ENV:-development}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@vambora.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_NAME: ${ADMIN_NAME:-Administrador}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - vambora-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: vambora-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - vambora-network

volumes:
  mysql_data:
    driver: local

networks:
  vambora-network:
    driver: bridge
